<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Games for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Games — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <div class="content-shell">
      <header class="content-header">
        <div class="content-header__intro">
          <p class="eyebrow">Games</p>
          <h1>Prediction markets and play</h1>
          <p class="content-header__text">
            Separate fun and forecasting links into a page that still feels like the same command system.
          </p>
        </div>
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <main class="content-main layout">
        <section class="panel panel--games">
          <div class="panel__header">
            <div>
              <h2>Games tools</h2>
              <p class="panel__intro-text">
                Tools with category Games appear here. HSX.com and other game links via the Tool Registry.
              </p>
            </div>
          </div>
          <div id="gamesGrid" class="spotlight-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js"></script>
    <script type="module" src="./app-games.js"></script>
  </body>
</html>
