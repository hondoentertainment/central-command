<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Choose a starter pack for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Starter Packs — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <div class="content-shell">
      <header class="content-header">
        <div class="content-header__intro">
          <p class="eyebrow">Starter Packs</p>
          <h1>Curated starting decks</h1>
          <p class="content-header__text">
            Start with a strong baseline, then evolve the deck around your real workflows instead of rebuilding from scratch.
          </p>
        </div>
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <main id="mainContent" class="content-main layout">
        <section class="panel panel--presets" aria-labelledby="presetIntroTitle">
          <div class="panel__header">
            <div>
              <p id="presetIntroEyebrow" class="eyebrow">Quick Start</p>
              <h2 id="presetIntroTitle">Choose a setup and start fast</h2>
              <p id="presetIntroText" class="preset-panel__text">
                Start with a preset, then tune the deck to match your day-to-day workflow.
              </p>
            </div>
          </div>
          <div id="presetGrid" class="preset-grid"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js" defer></script>
    <script type="module" src="./app-packs.js"></script>
  </body>
</html>
