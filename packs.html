<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Choose a starter pack for Central Command."
    />
    <meta name="theme-color" content="#09111f" />
    <title>Starter Packs — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero hero--compact">
        <div class="hero__copy">
          <p class="eyebrow">Starter Packs</p>
          <h1>Curated starting decks</h1>
          <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--presets" aria-labelledby="presetIntroTitle">
          <div class="panel__header">
            <div>
              <p id="presetIntroEyebrow" class="eyebrow">Quick Start</p>
              <h2 id="presetIntroTitle">Choose a setup and start fast</h2>
              <p id="presetIntroText" class="preset-panel__text">
                Start with a preset, then tune the deck to match your day-to-day workflow.
              </p>
            </div>
          </div>
          <div id="presetGrid" class="preset-grid"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js"></script>
    <script type="module" src="./app-packs.js"></script>
  </body>
</html>
