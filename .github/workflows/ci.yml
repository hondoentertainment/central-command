name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Syntax check all JS files
        run: |
          exit_code=0
          for f in *.js lib/*.js data/*.js; do
            if ! node -c "$f" 2>&1; then
              exit_code=1
            fi
          done
          exit $exit_code
      - run: npm run lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - "e2e/**"
              - "lib/**"
              - "**/*.html"
              - "app*.js"
              - "styles.css"
              - "data/**"
              - "serve.json"
              - "vercel.json"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        if: github.event_name == 'push' || steps.filter.outputs.app == 'true'
        env:
          CI: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
