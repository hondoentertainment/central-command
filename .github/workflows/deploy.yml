name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: node tests/run.js

      - name: Build Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node scripts/build-firebase-config.js

      - name: Copy site files
        run: |
          mkdir -p deploy deploy/icons deploy/config
          cp index.html registry.html agents.html packs.html sports.html games.html writing.html productivity.html history.html runbook.html deploy/
          cp app.js app-registry.js app-agents.js app-packs.js app-sports.js app-games.js app-writing.js app-productivity.js app-history.js app-runbook.js deploy/
          cp styles.css deploy/
          cp -r data lib deploy/
          cp config/firebase.config.example.js deploy/config/
          if [ -f config/firebase.config.generated.js ]; then cp config/firebase.config.generated.js deploy/config/; fi
          cp firebase.config.example.js deploy/
          cp favicon.svg manifest.json service-worker.js sw-register.js robots.txt sitemap.xml deploy/
          cp -r icons deploy/
          cp backup.json deploy/ 2>/dev/null || true
          # firebase.config.local.js is gitignored and must not be deployed; users add it locally

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/deploy-pages@v4
