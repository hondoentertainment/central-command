<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Recent launch history for Central Command."
    />
    <title>Recent History — Central Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero hero--compact">
        <div class="hero__copy">
          <p class="eyebrow">Launch History</p>
          <h1>Recent activity</h1>
          <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--activity">
          <div class="panel__header">
            <div>
              <h2>Recent launches</h2>
            </div>
            <button id="clearHistoryButton" class="ghost-button" type="button">Clear history</button>
          </div>
          <ul id="launchHistoryList" class="history-list" aria-live="polite"></ul>
        </section>
      </main>
    </div>

    <script type="module" src="./app-history.js"></script>
  </body>
</html>
