<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Recent launch history for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Recent History — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="./css/fonts.css" as="style" />
    <link rel="preload" href="./styles.css" as="style" />
    <link rel="preload" href="./fonts/dm-sans-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="modulepreload" href="./lib/nav.js" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <div class="content-shell">
      <header class="content-header">
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <div class="content-intro">
          <p class="eyebrow">Launch History</p>
          <h1>Recent activity</h1>
          <p class="content-intro__text">
            Review what you opened most recently, filter by workflow, and jump back into the tools that matter.
          </p>
        </div>

      <main id="mainContent" class="content-main layout">
        <section class="panel panel--activity">
          <div class="panel__header">
            <div>
              <h2>Recent launches</h2>
              <p class="panel__intro-text">
                See what you opened most often and jump back into recent tools with one click.
              </p>
            </div>
            <button id="clearHistoryButton" class="ghost-button" type="button">Clear history</button>
          </div>
          <label class="search">
            <span class="visually-hidden">Filter history by tool name or category</span>
            <input id="historyFilterInput" type="search" placeholder="Filter by tool or category" />
          </label>
          <div id="historyFilterActions" class="history-filter-actions" hidden>
            <button id="clearFiltersButton" class="ghost-button" type="button">Clear filters</button>
          </div>
          <ul id="launchHistoryList" class="history-list" aria-live="polite">
            <li class="skeleton-item"><div class="skeleton"></div><div class="skeleton"></div></li>
            <li class="skeleton-item"><div class="skeleton"></div><div class="skeleton"></div></li>
            <li class="skeleton-item"><div class="skeleton"></div><div class="skeleton"></div></li>
          </ul>
        </section>
      </main>
    </div>

    <!-- Lazy by route: this page loads only app-history.js (no main app.js). -->
    <script src="./sw-register.js" defer></script>
    <script type="module" src="./app-history.js"></script>
  </body>
</html>
