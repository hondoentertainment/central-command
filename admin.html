<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Admin and site management tools for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Admin — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <div class="content-shell">
      <header class="content-header">
        <div class="content-header__intro">
          <p class="eyebrow">Admin</p>
          <h1>Site update and maintenance tools</h1>
          <p class="content-header__text">
            Keep deploy, project, and operational links in one durable workspace instead of buried across browser tabs.
          </p>
        </div>
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <main class="content-main layout">
        <section class="panel panel--admin">
          <div class="panel__header">
            <div>
              <h2>Admin tools</h2>
              <p class="panel__intro-text">
                Tools with category Admin appear here. Add links like GitHub repo, Vercel project,
                and deployment dashboards in Tool Registry.
              </p>
            </div>
          </div>
          <div id="adminGrid" class="spotlight-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js"></script>
    <script type="module" src="./app-admin.js"></script>
  </body>
</html>
