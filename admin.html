<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Admin and site management tools for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Admin — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="./css/fonts.css" as="style" />
    <link rel="preload" href="./styles.css" as="style" />
    <link rel="preload" href="./fonts/dm-sans-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="modulepreload" href="./lib/nav.js" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <div class="content-shell">
      <header class="content-header">
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <div class="content-intro">
          <p class="eyebrow">Admin</p>
          <h1>Site update and maintenance tools</h1>
          <p class="content-intro__text">
            Keep deploy, project, and operational links in one durable workspace instead of buried across browser tabs.
          </p>
        </div>

      <main id="mainContent" class="content-main layout">
        <section class="panel panel--admin">
          <div class="panel__header">
            <div>
              <h2>Admin</h2>
              <p class="panel__intro-text">
                Tools with category Admin appear here. Add links like GitHub repo, Vercel project,
                and deployment dashboards in Tools.
              </p>
            </div>
          </div>
          <div id="adminGrid" class="spotlight-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js" defer></script>
    <script type="module" src="./app-admin.js"></script>
  </body>
</html>
