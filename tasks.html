<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Capture, prioritize, and complete. Your personal task inbox and daily focus list." />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Tasks · Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
    <style>
      /* Task card styles */
      .task-card {
        padding: 16px 20px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--panel-strong);
        display: flex;
        align-items: flex-start;
        gap: 14px;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        position: relative;
      }
      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-elevated);
        border-color: var(--line-strong);
      }
      .task-card + .task-card {
        margin-top: 8px;
      }
      .task-card--done {
        opacity: 0.55;
      }
      .task-card--done .task-card__title {
        text-decoration: line-through;
      }
      .task-card--overdue {
        border-left: 3px solid var(--crimson);
      }
      .task-card__checkbox {
        width: 20px;
        height: 20px;
        margin-top: 2px;
        flex-shrink: 0;
        accent-color: var(--teal);
        cursor: pointer;
      }
      .task-card__body {
        flex: 1;
        min-width: 0;
      }
      .task-card__title {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 6px;
        line-height: 1.4;
      }
      .task-card__meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .task-card__priority {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 6px;
        background: var(--surface-subtle);
      }
      .task-card__priority--low { color: var(--muted); }
      .task-card__priority--medium { color: var(--amber); }
      .task-card__priority--high { color: var(--crimson); }
      .task-card__priority--critical { color: #fff; background: var(--crimson); }
      .task-card__due {
        font-size: 0.78rem;
        color: var(--muted);
      }
      .task-card__due--overdue {
        color: var(--crimson);
        font-weight: 600;
      }
      .task-card__due--today {
        color: var(--amber);
        font-weight: 600;
      }
      .task-card__project {
        font-size: 0.75rem;
        color: var(--teal);
        background: rgba(62, 180, 165, 0.1);
        padding: 2px 8px;
        border-radius: 6px;
        text-decoration: none;
        white-space: nowrap;
      }
      .task-card__project:hover {
        background: rgba(62, 180, 165, 0.2);
      }
      .task-card__tools {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 6px;
      }
      .task-card__tool-chip {
        font-size: 0.72rem;
        color: var(--text-secondary);
        background: var(--surface-subtle);
        padding: 2px 8px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .task-card__notes {
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.45;
        margin-bottom: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .task-card__actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        margin-left: auto;
        align-self: center;
      }
      .task-card__actions .ghost-button {
        font-size: 0.78rem;
        padding: 4px 10px;
        min-height: 28px;
      }
      .task-card__recurring {
        font-size: 0.72rem;
        color: var(--cobalt);
        background: rgba(91, 127, 219, 0.1);
        padding: 2px 8px;
        border-radius: 6px;
      }

      /* Status group headers */
      .task-group__header {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        padding: 16px 0 8px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 8px;
      }
      .task-group__header:first-child {
        padding-top: 0;
      }

      /* Filter chips */
      .task-filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .task-filter-chip {
        font-family: var(--font-sans);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 160ms ease;
        white-space: nowrap;
      }
      .task-filter-chip:hover {
        color: var(--text);
        border-color: var(--line-strong);
        background: var(--surface-hover);
      }
      .task-filter-chip--active {
        color: var(--text);
        border-color: var(--teal);
        background: rgba(62, 180, 165, 0.1);
      }
      .task-filter-chip__count {
        font-weight: 700;
        margin-right: 4px;
      }

      /* Task form extras */
      .quick-add-form textarea {
        font-family: var(--font-sans);
        font-size: 0.875rem;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface-subtle);
        color: var(--text);
        resize: vertical;
        min-height: 60px;
        width: 100%;
        box-sizing: border-box;
      }
      .quick-add-form textarea:focus {
        outline: none;
        border-color: var(--teal);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      @media (max-width: 640px) {
        .task-card {
          padding: 14px 16px;
          gap: 10px;
        }
        .task-card__actions {
          flex-direction: column;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body class="content-page">
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <div class="content-shell">
      <header class="content-header">
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <div class="content-intro">
          <p class="eyebrow">Productivity</p>
          <h1>Tasks</h1>
          <p class="content-intro__text">Capture, prioritize, and complete. Your personal task inbox and daily focus list.</p>
      </div>

      <main id="mainContent" class="content-main layout">
        <section class="panel panel--tasks">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Task Board</p>
              <h2>All Tasks</h2>
            </div>
            <div class="panel__header-actions">
              <button type="button" id="addTaskBtn" class="primary-button">Add task</button>
            </div>
          </div>

          <div id="taskFormWrap" class="quick-add-form-wrap" hidden role="dialog" aria-modal="true" aria-label="Add or edit task">
            <form id="taskForm" class="quick-add-form">
              <label for="taskTitle" class="visually-hidden">Task title</label>
              <input id="taskTitle" type="text" placeholder="Task title" required aria-required="true" />
              <label for="taskNotes" class="visually-hidden">Notes</label>
              <textarea id="taskNotes" placeholder="Notes (optional)" rows="2"></textarea>
              <div class="form-row-split">
                <div>
                  <label for="taskStatus" class="visually-hidden">Status</label>
                  <select id="taskStatus">
                    <option value="inbox">Inbox</option>
                    <option value="today">Today</option>
                    <option value="in-progress">In Progress</option>
                    <option value="done">Done</option>
                    <option value="archived">Archived</option>
                  </select>
                </div>
                <div>
                  <label for="taskPriority" class="visually-hidden">Priority</label>
                  <select id="taskPriority">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                    <option value="critical">Critical</option>
                  </select>
                </div>
              </div>
              <div class="form-row-split">
                <div>
                  <label for="taskDueDate" class="visually-hidden">Due date</label>
                  <input id="taskDueDate" type="date" placeholder="Due date" />
                </div>
                <div>
                  <label for="taskProject" class="visually-hidden">Project</label>
                  <select id="taskProject">
                    <option value="">No project</option>
                  </select>
                </div>
              </div>
              <div>
                <label for="taskRecurring" class="visually-hidden">Recurring</label>
                <select id="taskRecurring">
                  <option value="">None</option>
                  <option value="daily">Daily</option>
                  <option value="weekly">Weekly</option>
                  <option value="monthly">Monthly</option>
                </select>
              </div>
              <div class="quick-add-form__actions">
                <button type="submit" class="primary-button" id="taskSubmitBtn">Add</button>
                <button type="button" id="taskCancelBtn" class="ghost-button">Cancel</button>
              </div>
            </form>
          </div>

          <div id="taskFilterBar" class="task-filter-bar"></div>
          <div id="taskList" aria-live="polite"></div>
          <div id="taskEmpty" class="empty-state" hidden>
            <p class="empty-state__title">No tasks yet</p>
            <p class="empty-state__text">Add your first task to start tracking your work.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js" defer></script>
    <script type="module" src="./app-tasks.js"></script>
  </body>
</html>
