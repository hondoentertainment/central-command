<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Productivity tools for Central Command."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Productivity — Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body class="content-page">
    <a href="#mainContent" class="skip-link">Skip to main content</a>
    <div class="content-shell">
      <header class="content-header">
        <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
      </header>

      <div class="content-intro">
          <p class="eyebrow">Productivity</p>
          <h1>Tools and routines</h1>
          <p class="content-intro__text">
            Bring together focus tools, logs, and routines so the workday feels intentional rather than scattered.
          </p>
        </div>

      <main id="mainContent" class="content-main layout">
        <section class="panel panel--productivity">
          <div class="panel__header">
            <div>
              <h2>Productivity</h2>
              <p class="panel__intro-text">
                Tools with category Productivity appear here. Add Evernote, task managers, or routine trackers in Tools.
              </p>
            </div>
          </div>
          <div id="productivityGrid" class="spotlight-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="./sw-register.js" defer></script>
    <script type="module" src="./app-productivity.js"></script>
  </body>
</html>
