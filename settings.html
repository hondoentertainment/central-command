<!doctype html>
<html lang="en">
  <head>
    <script>
      (function(){var t=localStorage.getItem("central-command.theme")||"dark";document.documentElement.classList.add("theme-"+t);})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Customize Central Command preferences and appearance." />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Settings - Central Command</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero hero--compact">
        <div class="hero__copy">
          <p class="eyebrow">Settings</p>
          <h1>Preferences and appearance</h1>
          <p class="hero__text">Manage visual options and defaults for your command center.</p>
          <nav id="pageNav" class="page-nav" aria-label="Main navigation"></nav>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--form">
          <div class="panel__header">
            <div>
              <h2>Appearance</h2>
            </div>
          </div>

          <form id="themeSettingsForm" class="tool-form">
            <fieldset class="settings-fieldset">
              <legend>Theme</legend>
              <label class="checkbox">
                <input type="radio" name="theme" value="dark" id="themeDark" />
                <span>Dark</span>
              </label>
              <label class="checkbox">
                <input type="radio" name="theme" value="light" id="themeLight" />
                <span>Light</span>
              </label>
            </fieldset>

            <p id="themeStatus" class="form-message" role="status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script src="./sw-register.js"></script>
    <script type="module" src="./app-settings.js"></script>
  </body>
</html>
